<!DOCTYPE html>
<html>
<head>
<title>Online Job Application</title>

<style>
body{
font-family: Arial;
background: linear-gradient(to right,#cce6ff,#3399ff);
margin:0;
}

header{
background:#004080;
color:white;
text-align:center;
padding:15px;
}

form{
width:380px;
background:white;
margin:40px auto;
padding:20px;
border-radius:10px;
box-shadow:0px 0px 10px gray;
}

h2{
text-align:center;
color:#004080;
}

input,select,textarea{
width:100%;
padding:8px;
margin:6px 0;
}

button{
background:#004080;
color:white;
border:none;
padding:10px;
width:100%;
border-radius:5px;
}

button:hover{
background:#0066cc;
cursor:pointer;
}

.error{
color:red;
font-size:14px;
}
</style>

</head>

<body>

<header>
<h1>Online Job Portal</h1>
</header>

<form id="jobForm">

<h2>Job Application Form</h2>

<label>Full Name</label>
<input type="text" id="fullname">
<div class="error" id="nameError"></div>

<label>Email</label>
<input type="email" id="email">
<div class="error" id="emailError"></div>

<label>Phone</label>
<input type="tel" id="phone">
<div class="error" id="phoneError"></div>

<label>Qualification</label>
<select id="qualification">
<option value="">Select</option>
<option>B.Sc</option>
<option>BCA</option>
<option>B.Tech</option>
<option>MCA</option>
</select>

<label>Skills</label>
<textarea id="skills" rows="3"></textarea>

<label>Upload Resume</label>
<input type="file" id="resume">

<br><br>
<button type="submit">Apply Job</button>

</form>

<script src="script.js"></script>

</body>
</html>
